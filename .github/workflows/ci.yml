name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Satisfies the startup guard in db/index.ts without a real connection.
  # No actual DB is used — tests mock the ORM and build pages are all dynamic.
  DATABASE_URL: postgresql://ci:ci@ci.neon.tech/ci
  JWT_SECRET: ci-placeholder-secret-minimum-32-chars-x

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
